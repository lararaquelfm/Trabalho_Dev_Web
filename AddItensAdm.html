<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="barra_navegacao_adm.css">
    <style>
        body,option, select{
            font-family: "Poppins", sans-serif;
        }

        .conteudo {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            margin: 20px;
            color: black;
                h1{
                    margin-top: 20px;
                    margin-bottom: 10px;
                    font-size: 50px;
                }
        }

        .preenchimento {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 2%;
            margin-top: 2%;
        }

        .campo-tamanhos {
            grid-template-columns: repeat(4, 1fr);
            display: grid;
            gap: 20px;
            margin-bottom: 5%;
        }

        .campo {
            display: flex;
            flex-direction: row;
        }

        .campo label {
            font-weight: bold;
            margin-right: 15px;
            font-size: 1.2rem;
            color: black;
        }

        .campo input {
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            width: 40%;

        }

        .botao-adicionar {
            color: white;
            background-color: #120a8f;
            border: none;
            padding: 12px 60px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 60%;
            margin: 0 auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="pcima">
        <img id="profile" src="imagens/profile.svg" style="width: 3%; height: auto" alt="ft de perfil">
        <h1>Administrador</h1>
    </div>
    <div class="plado">
        <div class="menu" style="width:15%;">
            <a href="DashBoardAdm.html">Dashboard</a>
            <a href="ComprasAdm.html">Compras</a>
            <a href="CadastrosAdm.html">Cadastros</a>
            <div id="ativo">
                <img src="imagens/arrowright.svg" alt="seta direita">
                <a href="ItensAdm.html">Itens</a>
            </div>
            <a href="CategoriasAdm.html">Categorias</a>
        </div>
        <div class="conteudo" style="width: 85%">
            <h1>Cadastrar Novo Produto</h1>
                <div class="preenchimento">
                    <div class="campo">
                        <label for="nome-item">Nome do Item:</label>
                        <input type="text" id="nome-item">
                    </div>
                    
                    <div class="campo">
                        <label for="valor-item">Valor (R$):</label>
                        <input type="number" id="valor-item" step="0.01">
                    </div>
                </div>

                <div class="campo-tamanhos">
                    <div class="campo">
                        <label for="qtd-p">Tam. P:</label>
                        <input type="number" id="qtd-p" min="0" value="0">
                    </div>
                    
                    <div class="campo">
                        <label for="qtd-m">Tam. M:</label>
                        <input type="number" id="qtd-m" min="0" value="0">
                    </div>
                    
                    <div class="campo">
                        <label for="qtd-g">Tam. G:</label>
                        <input type="number" id="qtd-g" min="0" value="0">
                    </div>
                    
                    <div class="campo">
                        <label for="qtd-gg">Tam. GG:</label>
                        <input type="number" id="qtd-gg" min="0" value="0">
                    </div>
                </div>
                <button type="submit" class="botao-adicionar">Salvar Item</button>
            </div>
        </div>
    </div>
