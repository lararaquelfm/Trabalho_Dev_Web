<style>
    #PesquisaFiltro{
        display: flex;
        padding: 10px;
        .filtragens{
            gap: 5px;
            flex-wrap: wrap;
        }
        .cat{
            padding-bottom: 10px;
        }
        h2{
            font-size: 120%;
            margin-bottom: 0;
            padding-left: 20px;
            padding-bottom: 5px;
        }
        .lista{
            width: 91%;
            font-size: 125%;
            max-height: 160px;
            overflow-y: auto;
            padding-left: 20px;
            padding-top: 0;
            padding-bottom: 10px;
            input[type="checkbox"] {
                accent-color: blue;
                cursor: pointer;
                width: 20px;
                height: 20px;
            }
            
            .opcao{
                display: flex;
                align-items: center;
                gap: 5px;
                padding-bottom: 5px;
            } 

        }

        .nrol{
            overflow-y: hidden;
        }

        .camisasFiltros{
            padding-left: 100px;
            h2{
                margin-left: 27px;
                margin-top: 0;
                font-size: 200%;
            }
            .bloco{
                display: flex;
                justify-content: space-around;
                padding-bottom: 30px;
            }
            .camisa{
                cursor: pointer;
                background-color: white;
                width: calc(18% + 8px); 
                color: black;
                border: 0.1em solid black;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
                border-radius: 15px;
                padding: 0.1%;
                p, h1{
                    text-align: center;
                }
                p{
                    font-size: 1.5em;
                }
                h1{
                    font-size: 2em;
                    margin-top: -7%;
                }
                button, img{
                    margin: 0 auto;
                    display: block;
                }
                button{
                    border-color: blue;
                    border-radius: 10px;
                    background-color: blue;
                    color: white;
                    width: 80%;
                    height: 5vh;
                    margin-top: -5%;
                    margin-bottom: 7%;
                    font-size: 1em;
                    cursor: pointer;
                    img{
                        margin-left: 5%;
                        top: 0.15em;
                        width: 1em;
                        position: relative;
                        display: inline;
                    }
                }
            }
        }
    }

    #PesquisaFiltro .lista input[type="checkbox"] + label{
        cursor: pointer;
    }

    #PesquisaFiltro .lista label:hover{
        font-weight: 600;
        color: #170b9b; 
    }

    #PesquisaFiltro .lista input:checked + label {
        font-weight: 600;
        color: #170b9b;;
    }


</style>
