    #cabecalho {
        background-color: #170b9b;
        display: flex;

    }
    #background{

    }

        display: flex;
        flex-wrap: wrap;

    .camisa{

        width: calc(18% + 8px);

        }

            }
        }
    }
    .botoes{

        }
    }
    .pesquisa{

        }
