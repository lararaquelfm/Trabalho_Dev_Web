<style>
    #background{
        width: 100%;
    }

    #camisas{
        display: flex;
        flex-wrap: wrap;
        gap: 1vw;
        position: relative;
        bottom: 15vh;
        padding: 1vw;
    }

    .camisa{
        cursor: pointer;
        background-color: white;
        width: calc(18% + 8px); 
        color: black;
        border: 0.1em solid black;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        border-radius: 15px;
        padding: 0.1%;
        p, h1{
            text-align: center;
        }
        p{
            font-size: 1.5em;
        }
        h1{
            font-size: 2em;
            margin-top: -7%;
        }
        button, img{
            margin: 0 auto;
            display: block;
        }
        button{
            border-color: blue;
            border-radius: 10px;
            background-color: blue;
            color: white;
            width: 80%;
            height: 5vh;
            margin-top: -5%;
            margin-bottom: 7%;
            font-size: 1em;
            cursor: pointer;
            img{
                margin-left: 5%;
                top: 0.15em;
                width: 1em;
                position: relative;
                display: inline;
            }
        }
    }
    #ofertas{
        margin-top: 0;
        margin-bottom: 0;
        font-size: 3em;
        margin-left: 1vw;
    }
    .deslizar{
        position: relative;
        width: 100%;
        .e_d{
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            img{
                padding-top: 5px;
                width: 23px;
            }
        }
        .esquerda{
            margin-left: 10px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
        .direita{
            margin-right: 10px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
    }
    .deslizar .seta {
        border-radius: 50%;
        background: rgba(224, 214, 214, 0.5);
        cursor: pointer;
        align-items: center;
        justify-content: center;
    }
    
    #carrossel{
        display: flex;
        gap: 30px;
        margin: auto; 
        overflow: hidden;
        justify-content: center;
        .camisa{
            padding: 15px;
            width:calc((0.8)*(18% + 8px)) ;
            min-width: 100px;
            height: 350px;
            flex-shrink: 0;
            button{
                font-size: 85%;
            }
        }  
    }
    .menulateral{
        font-size: 115%;
        top: 5.3%;
        left: 0;
        height: 32%;    
        border-radius: 5px;
        padding-top: 5px;
        width: 0;      
        position: absolute;      
        overflow: hidden;     
        transition: 0.3s;      
        background-color: #170b9b;
        z-index: 1000;
        .itens_menu_lateral{
            color: white;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            padding-top: 25px;
            padding-bottom: 25px;
            padding-left: 20px;
            a{
                display: flex;       
                align-items: center;
                text-decoration: none; 
                color: inherit;        
                outline: none;        
                border: none;
            }
        }
    }
    .menulateral.active{
        width: 250px;
    }
    
    .menulateral a:hover{
        font-weight: 700;
        color: #FFFF; 
    }
    
    .deletar{
        width: 70%;
        margin-left: 20px;
        display: grid;
        justify-content: center;
        align-items: center;
        border: 2px solid #FFFF;
        border-radius: 8px;
        border-color: #FFFF;
    }

    .deletar:hover{
        background-color: #FFFF;
        a{
            color: #170b9b;
        }
    }

    .linhavertical{
        border-left: 3.1px solid white; 
        height: 20px;                 
        margin: 0 15px;              
        display: inline-block;        
        vertical-align: middle;
        align-items: center;
        justify-content: center;
    }
    .bemvindo{

        color: #FFFF;
