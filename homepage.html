    #cabecalho {
        background-color: #170b9b;
        display: flex;
        flex-wrap: wrap;
        height: 8vh;
    }
    #background{
        width: 100%;
    }

    #camisas{
        display: flex;
        flex-wrap: wrap;
        gap: 1vw;
        position: relative;
        bottom: 15vh;
        padding: 1vw;
    }

    .camisa{
        background-color: white;
        width: calc(18% + 8px); 
        color: black;
        border: 0.1em solid black;
        border-radius: 15px;
        padding: 0.1%;
        p, h1{
            text-align: center;
        }
        p{
            font-size: 1.5em;
        }
        h1{
            font-size: 2em;
            margin-top: -7%;
        }
        button, img{
            margin: 0 auto;
            display: block;
        }
        button{
            border-color: blue;
            border-radius: 10px;
            background-color: blue;
            color: white;
            width: 80%;
            height: 5vh;
            margin-top: -5%;
            margin-bottom: 7%;
            font-size: 1em;
            img{
                margin-left: 5%;
                top: 0.15em;
                width: 1em;
                position: relative;
                display: inline;
            }
        }
    }
    .botoes{
        width: 4%;
        max-width: 30%;
        position: relative;
        margin-top: 0.2%;
        margin-left: 1%;
        img{

        }

    .pesquisa{

        height: 4%;
        max-width: 30%;
        max-height: 5%;

            position: absolute; 
            left: 1.5%;
            margin-top: 1.5%;
        }
        input{
