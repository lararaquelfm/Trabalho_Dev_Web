<!DOCTYPE html>
<html lang="pt-BR">
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Contrail+One&display=swap" rel="stylesheet">
    </head>
    <style>
        html, body{
            margin: 0;
            font-family: "Contrail One", sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

            #cabecalho {
                background-color: #170b9b;
                display: flex;
                flex-wrap: wrap;
            }
            
            .botoes{
            width: 50px;
            position: relative;
            left: 10px;
            margin-right: 1%;
            cursor: pointer;
            img{
                width: 100%;
            }
        }
        .pesquisa{
            position: relative;
            margin-left: 45%;
            margin-top: 0.4%;
            width: 500px;
            height: 30px;
            img{
                position: absolute; 
                left: 1%;
                margin-top: 6px;
            }
            input{
                border-radius: 15px;
                padding-left: 30px;
            }
        }

            #camisas{
                margin-left: 2%;
                display: flex;
                flex-wrap: wrap;
                flex-direction: column; /*deixa uma camisa abaixo da outra*/
                gap: 10px;
                padding: 10px;
                padding-bottom: 120px;
                .camisa{
                    background-color: white;
                    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
                    width: calc(95%); 
                    color: black;
                    border: 1px solid black;
                    border-radius: 15px;
                    padding: 15px;
                    display: flex;
                    align-items: center;
                    gap: 30px;
                }
        
                .camisa img {
                    max-width: 100px;
                    height: auto;
                }
        
                
                .camisa-detalhes h1 { /*referente ao título da camisa*/
                    font-size: 1.45rem;
                    margin: 0;
                }
                
                .lado-direito {
                    display: flex;
                    flex-direction: column;
                    align-items: flex-end;
                    margin-left: auto;
                    gap: 20px;
                }
                
                .camisa-controles { /*botões de controle de quantidade*/
                    display: flex; /*deixa um botao do lado do outro*/
                    align-items: center;
                    gap: 15px; /*distancia entre os botões*/
                    margin: 0;
                }

                .camisa-detalhes p{ /*referente ao valor do item*/
                    font-family: sans-serif;
                    font-size: 1.2rem;
                    margin: 0;
                    text-align: right;
                }

                .camisa-detalhes {
                    display: flex;
                    flex-direction: row;
                    align-items: flex-start;
                    width: 100%;
                    justify-content: space-between;
                }

                .lado-esquerdo {
                    display: flex;
                    flex-direction: column;
                    gap: 10px;
                }
                
                .controle-item { /*cada botão dos 3 botões de controle*/
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    width: 36px;
                    height: 36px;
                    background-color: #170b9b;
                    border-radius: 50%; 
                    color: white;
                    font-weight: bold;
                    font-size: 1.2rem;
                    cursor: pointer;
                    border: none;
                    padding: 0;
                }
        
                .controle-item img {
                    width: 30px;
                    display: block;
                }
        
                .checkbox-item {
                        width: 20px;
                        height: 20px;
                        cursor: pointer;
                        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
                }
                .camisa-variacao select { /*variações de cor e tamanho*/
                    border-radius: 20%;
                    cursor: pointer;
                    border-color: gray;
                }
            }


            #concluir { 
                position: fixed;
                background-color: white;
                bottom: 0;
                left: 0;
                z-index: 10;
                display: flex;
                flex-wrap: wrap;
                height: 15%;
                margin-bottom: 0;
                border: 1px solid black;
                align-items: center;
                width: 100%;
                box-sizing: border-box;
                
                .lado-direito {
                    margin-left: auto;
                    margin-right: 2%;
                    display: flex;
                    flex-direction: column;
                    align-items: flex-end;
                    gap: 10px;
                }
                
                .botao-finalizar {
                    color: white;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    background-color: #170b9b;
                    border-radius: 10px;
                    margin: 0;
                    height: 40px;
                    width: 200px;
                    cursor: pointer;
                }

                .valor-total {
                    font-family: sans-serif;
                    font-size: 1.2rem;
                    text-align: left;
                    margin: 0;
                }

                .checkbox-all { /*selecionar todos os itens do carrinho*/
                    display: flex;
                    align-items: center;
                    justify-content: flex-start;
                    margin-left: 2%;
                    gap: 10px;
                    width: auto;
                    cursor: pointer;
                }
                #selecionar-tudo { /*ajustar o tamanho da checkbox*/
                width: 25px;
                height: 25px;
                }
            }

            </style>

    </div>
        
        <div id="concluir">
            <div class="checkbox-all">
                <input type="checkbox" id="selecionar-tudo" class="checkbox-item"> <p>Selecionar tudo</p>
            </div>
