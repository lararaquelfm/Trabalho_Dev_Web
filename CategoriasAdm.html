<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador</title>
    <link rel="stylesheet" href="barra_navegacao_adm.css">
    <style>
        #pag{
            margin-left: 4%;
            width: 90%;
            margin: 0 auto;
        }
        #cabecalho{
            height: 15%;
            width: 100%;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: flex-start;
            h1{
                margin-top: 20px;
                font-size: 3.5em;
                display: inline-block;
                
            }
            .pesquisa{
                position: relative;
                width: 33%;
                height: 40px;
                img{
                    max-width: 7%;
                    position: absolute; 
                    left: 1.5%;
                    margin-top: 0.9%;
                }
                input{
                    font-size: 1.5em;
                    border: 1.5px solid gray;
                    border-radius: 50px;
                    padding-left: 10%;
                    width: 100%;
                    height: 93%;
                }
            }
            button{
                display: flex;
                justify-content: center;
                align-items: center;
                margin-left: 50px;
                border-color: #170b9b;
                border-radius: 50px;
                background-color: #170b9b;
                color: white;
                width: 20%;
                height: 40px;
                font-size: 1.2em;
                cursor: pointer;
                img{
                    width: 2em;
                }
            }
        }

        #filtros{
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            border: 1px solid gray;
            border-radius: 50px;
            margin-right: 20.5%;
            h1{
                margin: 10px;
            }
            .filtrar{
                width: 27%;
                height: 30px;
                padding: 4px;
                display: flex;
                align-items: center;
                border: 2px solid gray;
                border-radius: 50px;
                left: 100px;
                select{ 
                    font-size: 1em;
                    outline: #170b9b;
                    background: none;
                    cursor: pointer;
                    border-style: none;
                }
                img{
                    width: 26px;
                }
            }
        }

        #tabela{
            margin-top: 3%;
            table {
            width: 80%;
            border-collapse: collapse;
            margin-top: 20px;
            }

            th, td {
                border: 1px solid gray;
                padding: 10px;
                text-align: center;
            }

            th {
                background-color: #170b9b;
                color: white;
                font-weight: bold;
            }
            /* 
            Peguei o css do toggle box neste link: https://uiverse.io/zanina-yassine/afraid-eel-50
            */
            .toggle_switch{
                width: 51px;
                height: 31px;
                position: relative;
                margin-left: 40%;
                .checkbox {
                    opacity: 0;
                    width: 0;
                    height: 0;
                    position: absolute;
                }
                .switch {
                    width: 100%;
                    height: 100%;
                    display: block;
                    background-color: #e9e9eb;
                    border-radius: 16px;
                    cursor: pointer;
                    transition: all 0.2s ease-out;
                }
                .slider {
                    width: 27px;
                    height: 27px;
                    position: absolute;
                    left: calc(50% - 27px/2 - 10px);
                    top: calc(50% - 27px/2);
                    border-radius: 50%;
                    background: #FFFFFF;
                    box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.15), 0px 3px 1px rgba(0, 0, 0, 0.06);
                    transition: all 0.2s ease-out;
                    cursor: pointer;
                }

                .checkbox:checked + .switch {
                    background-color: #170b9b;
                }

                .checkbox:checked + .switch .slider {
                    left: calc(50% - 27px/2 + 10px);
                    top: calc(50% - 27px/2);
                }
            }
            button{
                width: 30%;
                cursor: pointer;
                border: none;
                background: none;
                img{
                    width: 75%;
                }
            }
        }

    </style>
</head>
<body>

                    <div id="tabela">

                            <td>

                                    <input type="checkbox" class="checkbox" id="checkbox2">

                            </td>

                            <td>
                                <div class="toggle_switch">
                                    <input type="checkbox" class="checkbox" id="checkbox3">
                                    <label class="switch" for="checkbox3">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </td>
                            <td>

                                    <img src="imagens/lixeira_preta.svg" alt="icone para delet">

                                <button>
